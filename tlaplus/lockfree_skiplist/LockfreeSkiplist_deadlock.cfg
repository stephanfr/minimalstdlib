\* Deadlock-focused model check for LockfreeSkiplist

CONSTANTS
    Keys = {1, 2}
    Threads = {1}
    Cpus = {1}
    MaxLevels = 1
    MaxRetryTicks = 2
    MaxEpoch = 4
    EpochLag = 2
    MaxReadDepth = 2

SPECIFICATION Spec

CHECK_DEADLOCK TRUE

INVARIANT
    TypeOK
    StateConsistency

    FullyUnlinkedSubsetRetired
    InterruptReentrancySafe

