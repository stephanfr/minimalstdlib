\* Liveness-oriented check to expose retry-loop non-termination traces.

CONSTANTS
    Keys = {1}
    Threads = {1}
    Cpus = {1}
    MaxLevels = 1
    MaxRetryTicks = 2
    MaxEpoch = 4
    EpochLag = 2
    MaxReadDepth = 2

SPECIFICATION SpecFair

CHECK_DEADLOCK TRUE

INVARIANT
    TypeOK
    StateConsistency

    FullyUnlinkedSubsetRetired
    InterruptReentrancySafe


\* If TLC finds a counterexample, it shows a behavior where a thread remains
\* in a retry loop forever (livelock), even though deadlock is absent.
PROPERTY
    ActiveOpsEventuallyFinish
