\* Focused remove-bottom liveness check.
\* Uses a remove-only fair specification so remove paths are exercised.

CONSTANTS
    Keys = {1}
    Threads = {1}
    Cpus = {1}
    MaxLevels = 2
    MaxRetryTicks = 3
    MaxEpoch = 8
    EpochLag = 2
    MaxReadDepth = 2

SPECIFICATION SpecRemoveFair

CHECK_DEADLOCK TRUE

INVARIANT
    TypeOK
    StateConsistency

    FullyUnlinkedSubsetRetired
    InterruptReentrancySafe


PROPERTY
    RemoveBottomEventuallyIdle
