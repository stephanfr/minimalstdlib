\* Interrupt re-entrancy safety check for LockfreeSkiplist.
\*
\* A single CPU runs two logical threads (one kernel thread, one ISR).
\* MaxReadDepth=3 allows up to 3 levels of nesting so TLC can explore
\* kernel -> ISR -> nested ISR re-entrancy.
\*
\* The key invariant checked is InterruptReentrancySafe:
\*   Any CPU with readerDepth >= 1 must have a non-zero epoch snapshot,
\*   proving the outermost enter_read_section correctly recorded the epoch
\*   before any nested (interrupt-context) calls inherited it.

CONSTANTS
    Keys = {1, 2}
    Threads = {1, 2}
    Cpus = {1}
    MaxLevels = 1
    MaxRetryTicks = 2
    MaxEpoch = 4
    EpochLag = 2
    MaxReadDepth = 3

SPECIFICATION Spec

CHECK_DEADLOCK TRUE

INVARIANT
    TypeOK
    StateConsistency

    FullyUnlinkedSubsetRetired
    InterruptReentrancySafe

