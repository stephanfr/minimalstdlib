\* TLC Configuration for BitblockSet - Strict orphan check
\* Same parameters as main, but checks StrictSafety which includes
\* NoOrphanBits. This SHOULD FAIL, demonstrating the bug in
\* acquire_multi_word where a failed first-word fetch_or does not
\* roll back newly set bits.

CONSTANTS
    BPW = 3
    NW = 2
    NumCPUs = 2
    MaxInterruptDepth = 1
    MaxBits = 3
    MaxOps = 2

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT StrictSafety
