\* TLC Configuration for BitblockSet - Stress test
\* 2 words x 3 bits, 3 CPUs, nested interrupts (depth 2).
\* Exercises wider contention and deeper interrupt nesting
\* with more operations per context.

CONSTANTS
    BPW = 3
    NW = 2
    NumCPUs = 3
    MaxInterruptDepth = 2
    MaxBits = 3
    MaxOps = 3

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT Safety
