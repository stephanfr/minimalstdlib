\* TLC Configuration for BitblockSet - Main verification
\* 2 words x 3 bits, 2 CPUs with interrupt reentrancy.
\* Tests the core kernel scenario: multi-word operations
\* interleaved with ISR operations on the same data structure.
\* Checks MutualExclusion and OwnedImpliesSet (Safety).

CONSTANTS
    BPW = 3
    NW = 2
    NumCPUs = 2
    MaxInterruptDepth = 1
    MaxBits = 3
    MaxOps = 2

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT Safety
