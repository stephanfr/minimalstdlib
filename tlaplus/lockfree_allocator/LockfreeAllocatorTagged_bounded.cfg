\* TLC Configuration for LockfreeAllocatorTagged - Bounded exploration
\* Uses state constraint to limit version growth while checking core safety

CONSTANTS
    NumBlocks = 2
    NumCPUs = 2
    MaxInterruptDepth = 0

SPECIFICATION Spec

\* Check core safety properties (not TypeOK version bounds)
INVARIANT CoreSafety

\* State constraint: stop exploring when version gets too high
\* This bounds the state space while still checking safety within that bound
CONSTRAINT VersionBound
