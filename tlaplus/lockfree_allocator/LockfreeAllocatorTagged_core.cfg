\* TLC Configuration for LockfreeAllocatorTagged - Core safety only
\* Bounded exploration to keep state space finite

CONSTANTS
    NumBlocks = 2
    NumCPUs = 2
    MaxInterruptDepth = 0

SPECIFICATION Spec

\* Only check core safety, not TypeOK with version bounds
INVARIANT CoreSafety

\* Bound version growth to keep state space finite
CONSTRAINT VersionBound
